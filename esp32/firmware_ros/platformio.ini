; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
default_envs = esp32-wroom-ros

[env:esp32-wroom-ros]
platform = espressif32
board = upesy_wroom
framework = arduino
monitor_speed = 115200


; do not forget to build the littlefs image and upload it to the board before uploading the firmware. You can do this by running "pio run -t buildfs" and "pio run -t uploadfs" in the terminal.
;board_build.filesystem = littlefs ; only needed for WIFI_CONFIG_AP, but it is needed for the WROOM, so we disable it for now. It can be enabled if needed.

build_flags = 
;	-DWIFI  ; Wifi is not tested on the WROOM, so we disable it for now. It can be enabled if needed.
;	-DWIFI_CONFIG_AP
;	-DWIFI_SSID=\"your_ssid\"
;	-DWIFI_PASSWORD=\"your_password\"
;	-DAGENT_IP_ADDRESS=\"192.168.2.150\"
	-Ofast
	-DI2S_WS=25
	-DI2S_SD=33
	-DI2S_SCK=26
	-DI2S_PORT=I2S_NUM_0
	-DONBOARD_LED_PIN=2
monitor_filters = esp32_exception_decoder

lib_deps =
    https://github.com/AvansMechatronica/micro_ros_platformio
;    WiFi
;    ESP32Async/ESPAsyncWebServer

; Select transport for micro-ROS
;board_microros_transport = wifi ; Only enable wifi if you have tested it on your board. It is not tested on the WROOM, so we disable it for now. It can be enabled if needed.
board_microros_transport = serial

[env:esp32-S3-ros]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200


board_build.filesystem = littlefs

build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DWIFI
	-DWIFI_CONFIG_AP
	-DWIFI_SSID=\"VRV9517724283\"
	-DWIFI_PASSWORD=\"@AYCwXhz976C\"
	-DAGENT_IP_ADDRESS=\"192.168.2.150\"
	-Ofast
	-DI2S_WS=25
	-DI2S_SD=33
	-DI2S_SCK=26
	-DI2S_PORT=I2S_NUM_0
	-DONBOARD_LED_PIN=2
monitor_filters = esp32_exception_decoder

lib_deps =
    https://github.com/AvansMechatronica/micro_ros_platformio
    WiFi
    ESP32Async/ESPAsyncWebServer

; Select transport for micro-ROS
board_microros_transport = wifi 
;board_microros_transport = serial